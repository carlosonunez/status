name: status-bot

services:

  # Compiles the status binary. GOOS/GOARCH/BIN_EXT are injected by the
  # Justfile so the output binary matches the host platform.
  build:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
    command: ["sh", "-c", "go build -ldflags \"-X main.version=$$VERSION -X main.commit=$$COMMIT -X main.date=$$DATE\" -o bin/status$$BIN_EXT ./cmd/status"]
    environment:
      CGO_ENABLED: "0"
      GOOS: ${GOOS:-linux}
      GOARCH: ${GOARCH:-amd64}
      BIN_EXT: ${BIN_EXT:-}
      VERSION: ${VERSION:-dev}
      COMMIT: ${COMMIT:-unknown}
      DATE: ${DATE:-unknown}

  # Runs the full test suite. DynamoDB Local is started as a dependency.
  test:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
    command: go test ./... -v -count=1
    environment:
      CGO_ENABLED: "0"
      AWS_ENDPOINT_DYNAMODB: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      dynamodb-local:
        condition: service_healthy

  # Runs only unit tests (no external service dependencies).
  test-unit:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
    command: go test ./... -short -v -count=1
    environment:
      CGO_ENABLED: "0"
      AWS_ENDPOINT_DYNAMODB: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      dynamodb-local:
        condition: service_healthy

  # Runs golangci-lint.
  lint:
    image: golangci/golangci-lint:v1.64-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
    command: golangci-lint run ./...

  # Runs the daemon.
  dev:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
      - ${STATUS_CONFIG_DIR:-~/.config/status}:/root/.config/status:ro
      - ~/.gnupg:/root/.gnupg:ro
    command: go run ./cmd/status start
    environment:
      CGO_ENABLED: "0"
      AWS_ENDPOINT_DYNAMODB: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      dynamodb-local:
        condition: service_healthy
    restart: unless-stopped

  # DynamoDB Local for development and integration tests.
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.3
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 -o /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # AWS CLI helper for one-off admin tasks (e.g. just dynamo-init).
  awscli:
    image: amazon/aws-cli:2.15.0
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["aws"]
    depends_on:
      - dynamodb-local

  # Compiles all plugin binaries. Each plugins/getter/<name>/cmd/main.go becomes
  # bin/status-getter-<name>[.exe]; plugins/setter/<name>/cmd/main.go becomes
  # bin/status-setter-<name>[.exe].
  build-plugins:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
    environment:
      CGO_ENABLED: "0"
      GOOS: ${GOOS:-linux}
      GOARCH: ${GOARCH:-amd64}
      BIN_EXT: ${BIN_EXT:-}
    command:
      - sh
      - -euc
      - |
        go mod tidy
        for dir in plugins/getter/*/cmd; do
          [ -d "$$dir" ] || continue
          name=$$(basename $$(dirname $$dir))
          echo "Building status-getter-$$name..."
          go build -o bin/status-getter-$$name$$BIN_EXT ./$$dir
        done
        for dir in plugins/setter/*/cmd; do
          [ -d "$$dir" ] || continue
          name=$$(basename $$(dirname $$dir))
          echo "Building status-setter-$$name..."
          go build -o bin/status-setter-$$name$$BIN_EXT ./$$dir
        done

  # Headless Chrome for TripIt integration tests (chromedp remote allocator).
  chrome:
    image: chromedp/headless-shell:latest
    ports:
      - "9222:9222"
    command: ["--remote-debugging-address=0.0.0.0", "--remote-debugging-port=9222", "--no-sandbox"]

  # Runs TripIt integration tests against a real TripIt sandbox account.
  test-integration-tripit:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
    command: go test -tags integration ./plugins/getter/tripit/... -v -count=1 -timeout 120s
    environment:
      CGO_ENABLED: "0"
      CHROME_REMOTE_URL: ws://chrome:9222
      TRIPIT_APP_CLIENT_ID: ${TRIPIT_APP_CLIENT_ID:-}
      TRIPIT_APP_CLIENT_SECRET: ${TRIPIT_APP_CLIENT_SECRET:-}
      TRIPIT_SANDBOX_ACCOUNT_EMAIL: ${TRIPIT_SANDBOX_ACCOUNT_EMAIL:-}
      TRIPIT_SANDBOX_ACCOUNT_PASSWORD: ${TRIPIT_SANDBOX_ACCOUNT_PASSWORD:-}
      TRIPIT_ACCESS_TOKEN: ${TRIPIT_ACCESS_TOKEN:-}
      TRIPIT_TOKEN_SECRET: ${TRIPIT_TOKEN_SECRET:-}
    depends_on:
      - chrome

  # Builds a release binary and pushes to ECR.
  deploy:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - gomod-cache:/go/pkg/mod
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh scripts/deploy.sh
    environment:
      CGO_ENABLED: "0"

volumes:
  go-cache:
  gomod-cache:
